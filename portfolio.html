<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Portfolio</title>
    <link rel="stylesheet" href="style-portfolio.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="theme-light"> 
    
    <div class="action-bar" id="actionBar">
        <button id="downloadPdfBtn" class="btn-pdf">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; margin-right: 5px;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
            </svg>
            Download CV as PDF
        </button>
    </div>

    <div class="portfolio-container" id="portfolioContent">
        
        <header class="hero-section">
            <div class="hero-content">
                <div class="hero-avatar-wrapper">
                    <img id="portfolioAvatar" src="https://via.placeholder.com/150" class="portfolio-avatar-frame" alt="Professional Headshot">
                </div>
                <div style="flex-grow: 1;">
                    <h1 id="ownerName" style="margin: 0 0 8px 0; font-size: 36px; font-weight: 700;"></h1>
                    <p id="ownerTitle" style="font-size: 18px; font-weight: 600; color: var(--accent); margin: 0 0 12px 0;"></p>
                    <p id="ownerLocation" style="font-size: 14px; color: var(--text-muted); margin: 0 0 16px 0; font-weight: 500;"></p>
                    <p id="ownerBio" style="margin: 0; font-size: 15px; line-height: 1.7; color: var(--text-main); white-space: pre-wrap;"></p>
                </div>
            </div>
        </header>

        <div class="portfolio-grid-layout">
            <aside class="sidebar-aside" style="display: flex; flex-direction: column; gap: 30px;">
                
                <div class="card identity-card-aside">
                    <h3>Contact Information</h3>
                    <div style="display: flex; flex-direction: column; gap: 14px; margin-top: 15px;">
                        <div id="emailRow">✉️ <a id="metaEmail" href="#"></a></div>
                        <div id="phoneRow">📞 <a id="metaPhone" href="#"></a></div>
                    </div>
                    <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;">
                    <h3>Professional Networks</h3>
                    <div style="display: flex; gap: 14px; margin-top: 15px; font-size: 14px;">
                        <a id="linkLinkedin" href="#" target="_blank" style="color: var(--accent); font-weight: 600; text-decoration: none;">LinkedIn</a>
                        <a id="linkGithub" href="#" target="_blank" style="color: var(--accent); font-weight: 600; text-decoration: none;">GitHub</a>
                        <a id="linkTwitter" href="#" target="_blank" style="color: var(--accent); font-weight: 600; text-decoration: none;">Twitter/X</a>
                    </div>
                </div>

                <div class="card education-card-aside">
                    <h3>Education Milestones</h3>
                    <div id="educationTimeline" style="display: flex; flex-direction: column; gap: 16px; margin-top: 15px;"></div>
                </div>

                <div class="card skills-card-aside">
                    <h3>Core Capabilities</h3>
                    <div id="techSkillsContainer" class="badge-group" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px;"></div>
                </div>

                <div class="card contact-form-card">
                    <h3>Send a Message</h3>
                    <form id="contactForm">
                        <input type="text" id="senderName" class="input-form" placeholder="Full Name" required>
                        <input type="email" id="senderEmail" class="input-form" placeholder="Email Address" required>
                        <textarea id="senderMsg" class="input-form msg-area" placeholder="How can I help you?" required></textarea>
                        <button type="submit" class="submit-msg-btn">Send Message</button>
                    </form>
                    <div id="contactAck" class="contact-acknowledgement"></div>
                </div>
            </aside>

            <main class="main-timeline">
                <div class="card experience-card">
                    <h3>Professional Experience</h3>
                    <div id="experienceTimeline" class="timeline" style="display: flex; flex-direction: column; gap: 24px; margin-top: 15px;"></div>
                </div>

                <div class="card projects-card">
                    <h3>Project Portfolio</h3>
                    <div id="dynamicFilters" class="filter-container"></div>
                    <div id="projectsGrid" class="projects-grid-layout"></div>
                </div>
            </main>
        </div>
    </div>
    
    <script type="module" src="view.js"></script>
</body>
</html>
